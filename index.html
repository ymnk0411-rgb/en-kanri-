// ---- Assign Member by Category ----
function openAssignByCategory(pid, category) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p.staffIds) p.staffIds = [];
  p.staffIds = p.staffIds.map(id=>+id);
  const label = category==='member'?'出演メンバー':'スタッフ';
  // staffCategoryがないメンバーはmemberとして扱う
  const pool = state.members.filter(m=>(m.staffCategory||'member')===category);
  const opts = pool.map(m=>`
    <label style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer">
      <input type="checkbox" value="${m.id}" ${p.staffIds.includes(+m.id)?'checked':''} style="width:16px;height:16px">
      <div><div style="font-weight:500">${m.name}</div><div style="font-size:12px;color:#888">${m.role||''}</div></div>
    </label>`).join('');
  showModal(`<div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">${label}を選択</div>
    <div style="font-size:12px;color:#888;margin-bottom:12px">チェックして保存してください</div>
    <div id="member-checks">${opts||'<div class="empty-state" style="padding:20px 0">登録されている'+label+'がいません<br><small style="color:#aaa">メンバー管理ページから追加できます</small></div>'}</div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModalForce()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAssignByCategory(${pid},'${category}')">保存</button>
    </div>
  </div>`);
}
function submitAssignByCategory(pid, category) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p.staffIds) p.staffIds = [];
  const pool = state.members.filter(m=>(m.staffCategory||'member')===category).map(m=>+m.id);
  const checked = [...document.querySelectorAll('#member-checks input[type=checkbox]:checked')].map(c=>+c.value);
  // 他カテゴリのIDは残しつつ今回のカテゴリだけ更新
  p.staffIds = p.staffIds.map(id=>+id).filter(id=>!pool.includes(id)).concat(checked);
  fbSave('projects', pid, p);
  closeModalForce(); render();
}

// ---- Asset Selector Modal (Vehicle / Instrument / Equipment) ----
function openAssetSelector(pid, type) {
  const p = state.projects.find(x=>x.id===pid);
  const labels = {vehicle:'車両',instrument:'楽器',equipment:'機材'};
  const registry = type==='vehicle' ? state.vehicles : type==='instrument' ? state.instruments : state.equipment;
  const selectedIds = type==='vehicle' ? (p.vehicleIds||[]) : type==='instrument' ? (p.instrumentIds||[]) : (p.equipmentIds||[]);

  // Group by category
  const cats = {};
  registry.forEach(item => {
    const cat = item.category || 'その他';
    if(!cats[cat]) cats[cat] = [];
    cats[cat].push(item);
  });

  const catHtml = Object.entries(cats).map(([cat, items]) => `
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid #f0f0f0">${cat}</div>
      ${items.map(item=>`
        <label style="display:flex;align-items:center;gap:10px;padding:7px 0;cursor:pointer">
          <input type="checkbox" class="asset-check" value="${item.id}" ${selectedIds.includes(item.id)?'checked':''} style="width:16px;height:16px">
          <span style="font-size:13px">${item.name}</span>
          ${item.notes?`<span style="font-size:11px;color:#aaa">${item.notes}</span>`:''}
        </label>`).join('')}
    </div>`).join('');

  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:480px">
    <div class="modal-title">${labels[type]}を選択</div>
    <div style="font-size:12px;color:#888;margin-bottom:14px">チェックした${labels[type]}が案件に追加されます</div>
    <div id="asset-checks" style="max-height:380px;overflow-y:auto">${catHtml||'<div class="empty-state">登録されている'+labels[type]+'がありません</div>'}</div>
    <div style="margin-top:12px;padding-top:12px;border-top:1px solid #ebebeb;font-size:12px;color:#888">
      ※ マスタ管理ページから${labels[type]}を追加できます
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModalForce()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAssetSelector(${pid},'${type}')">保存</button>
    </div>
  </div>`);
}
function submitAssetSelector(pid, type) {
  const p = state.projects.find(x=>x.id===pid);
  const checked = [...document.querySelectorAll('#asset-checks .asset-check:checked')].map(c=>+c.value);
  if(type==='vehicle') p.vehicleIds = checked;
  if(type==='instrument') p.instrumentIds = checked;
  if(type==='equipment') p.equipmentIds = checked;
  fbSave('projects', pid, p);
  closeModalForce(); render();
}

// ========== EXPORT ==========
function exportCSV(){
  if(!isAdmin()){alert('管理者のみエクスポートできます');return;}
  const headers=['案件番号','案件名','種別','ステータス','公演日','顧客','契約金額','原価合計','粗利','粗利率'];
  const rows=state.projects.map(p=>{
    const c=state.customers.find(x=>x.id===p.customerId);
    const f=p.finance;
    const cost=calcTotalCost(f);
    const gp=f.contractAmount-cost;
    const gpr=f.contractAmount>0?(gp/f.contractAmount*100).toFixed(1)+'%':'0%';
    return [p.number,p.name,p.category,p.status,p.date,c?c.name:'-',f.contractAmount,cost,gp,gpr].join(',');
  });
  const csv='\uFEFF'+[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='EN_案件データ_'+new Date().toLocaleDateString('ja-JP').replace(/\//g,'-')+'.csv';
  a.click();
}



// ========== BREAKDOWN FUNCTIONS ==========
function toggleBreakdown(type) {
  const tbody = document.getElementById('fc-'+type+'-tbody');
  const btn = document.getElementById('fc-'+type+'-toggle');
  if(!tbody) return;
  const isOpen = tbody.style.display !== 'none';
  tbody.style.display = isOpen ? 'none' : '';
  btn.textContent = isOpen ? '明細▼' : '明細▲';
}

// makeBreakdownRowsをグローバルに定義（addBreakdownRowから呼べるよう）
function makeBreakdownRows(type, arr, pid) {
  if(!arr || !arr.length) return '';
  var html = '';
  arr.forEach(function(row) {
    var rid = row.id;
    var safeN = (row.name||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    var safeR = (row.role||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    html += '<tr id="bd-row-' + type + '-' + rid + '">';
    html += '<td style="padding:4px 12px"><div style="display:flex;gap:6px">';
    html += '<input value="' + safeN + '" placeholder="氏名"';
    html += ' data-pid="' + pid + '" data-type="' + type + '" data-rid="' + rid + '" data-field="name"';
    html += ' style="flex:1;border:1px solid #e0e0e0;border-radius:5px;padding:4px 8px;font-size:13px"';
    html += ' onchange="bdChange(this)">';
    html += '<input value="' + safeR + '" placeholder="役割"';
    html += ' data-pid="' + pid + '" data-type="' + type + '" data-rid="' + rid + '" data-field="role"';
    html += ' style="width:80px;border:1px solid #e0e0e0;border-radius:5px;padding:4px 6px;font-size:12px"';
    html += ' onchange="bdChange(this)">';
    html += '</div></td>';
    html += '<td><input type="number" value="' + (row.amount||0) + '"';
    html += ' data-pid="' + pid + '" data-type="' + type + '" data-rid="' + rid + '"';
    html += ' style="width:130px;text-align:right;border:1px solid #ddd;border-radius:5px;padding:4px 6px;font-size:13px"';
    html += ' oninput="bdAmtChange(this)"></td>';
    html += '<td style="text-align:center;padding:4px">';
    html += '<button data-pid="' + pid + '" data-type="' + type + '" data-rid="' + rid + '"';
    html += ' style="color:#d1d5db;font-size:16px;background:none;border:none;cursor:pointer"';
    html += ' onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'#d1d5db\'"';
    html += ' onclick="bdDelClick(this)">×</button></td></tr>';
  });
  return html;
}

// data属性からフィールド更新
function bdChange(el) {
  const pid = +el.dataset.pid;
  const type = el.dataset.type;
  const rid = +el.dataset.rid;
  const field = el.dataset.field;
  updateBreakdownField(pid, type, rid, field, el.value);
}

// data属性から金額更新
function bdAmtChange(el) {
  const pid = +el.dataset.pid;
  const type = el.dataset.type;
  const rid = +el.dataset.rid;
  updateBreakdownAmount(pid, type, rid, el.value);
}

// data属性から行削除
function bdDelClick(el) {
  const pid = +el.dataset.pid;
  const type = el.dataset.type;
  const rid = +el.dataset.rid;
  deleteBreakdownRow(pid, type, rid);
}

function addBreakdownRow(type, pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p||!p.finance) return;
  const arr = type==='labor' ? p.finance.laborBreakdown : p.finance.outsourceBreakdown;
  const newId = arr.length>0 ? Math.max(...arr.map(x=>x.id))+1 : 1;
  arr.push({id:newId, name:'', role:'', amount:0});
  const tbody = document.getElementById('fc-'+type+'-tbody');
  if(tbody) {
    const addBtn = tbody.lastElementChild;
    const tmp = document.createElement('tbody');
    tmp.innerHTML = makeBreakdownRows(type, [{id:newId,name:'',role:'',amount:0}], pid);
    const newTr = tmp.querySelector('tr');
    if(newTr) {
      tbody.insertBefore(newTr, addBtn);
      newTr.querySelector('input').focus();
    }
  }
}

function updateBreakdownField(pid, type, rowId, field, val) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  const arr = type==='labor' ? p.finance.laborBreakdown : p.finance.outsourceBreakdown;
  const row = arr.find(x=>x.id===rowId);
  if(row) row[field] = val;
}

function updateBreakdownAmount(pid, type, rowId, val) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  const arr = type==='labor' ? p.finance.laborBreakdown : p.finance.outsourceBreakdown;
  const row = arr.find(x=>x.id===rowId);
  if(row) { row.amount = +val||0; }
  // 合計を即時更新
  const total = arr.reduce((s,x)=>s+(+x.amount||0),0);
  const disp = document.getElementById('fc-'+type+'-display');
  if(disp) disp.textContent = yen(total);
  // costsに反映
  if(type==='labor') p.finance.costs.labor = total;
  if(type==='outsource') p.finance.costs.outsource = total;
  // 原価合計も更新
  recalcFromBreakdown(pid);
}

function recalcFromBreakdown(pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  const t = +(document.getElementById('fc-transport')?.value)||0;
  const labor = sumBreakdown(p.finance.laborBreakdown) || +(document.getElementById('fc-labor-display')?.textContent.replace(/[^0-9]/g,''))||0;
  const outsource = sumBreakdown(p.finance.outsourceBreakdown) || +(document.getElementById('fc-outsource-display')?.textContent.replace(/[^0-9]/g,''))||0;
  const m = +(document.getElementById('fc-misc')?.value)||0;
  const tr = +(document.getElementById('fc-travel')?.value)||0;
  let customTotal = 0;
  document.querySelectorAll('.fc-custom-amt').forEach(el=>{ customTotal+=+(el.value)||0; });
  const total = t+labor+outsource+m+tr+customTotal;
  if(document.getElementById('fc-total-display')) document.getElementById('fc-total-display').textContent=yen(total);
  if(canSeeRevenue()) {
    const contract=+(document.getElementById('fc-contract')?.value)||0;
    const gp=contract-total;
    const gpr=contract>0?(gp/contract*100).toFixed(1):'0.0';
    const c=gp>=0?'#16a34a':'#dc2626';
    if(document.getElementById('fc-gp-display')){document.getElementById('fc-gp-display').textContent=yen(gp);document.getElementById('fc-gp-display').style.color=c;}
    if(document.getElementById('fc-gpr-display')){document.getElementById('fc-gpr-display').textContent=gpr+'%';document.getElementById('fc-gpr-display').style.color=c;}
  }
}

function deleteBreakdownRow(pid, type, rowId) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  if(type==='labor') p.finance.laborBreakdown = p.finance.laborBreakdown.filter(x=>x.id!==rowId);
  if(type==='outsource') p.finance.outsourceBreakdown = p.finance.outsourceBreakdown.filter(x=>x.id!==rowId);
  const row = document.getElementById('bd-row-'+type+'-'+rowId);
  if(row) row.remove();
  // 合計を更新
  const arr = type==='labor' ? p.finance.laborBreakdown : p.finance.outsourceBreakdown;
  const total = sumBreakdown(arr);
  const disp = document.getElementById('fc-'+type+'-display');
  if(disp) disp.textContent = yen(total);
  if(type==='labor') p.finance.costs.labor = total;
  if(type==='outsource') p.finance.costs.outsource = total;
  recalcFromBreakdown(pid);
}

function openMobileDrawer() {
  document.getElementById('mobile-drawer').classList.add('open');
  document.getElementById('mobile-overlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}
function closeMobileDrawer() {
  document.getElementById('mobile-drawer').classList.remove('open');
  document.getElementById('mobile-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
function isMobile() { return window.innerWidth <= 768; }
function updateMobileNav(view) {
  if (!isMobile()) return;
  // ハンバーガーボタン表示
  const btn = document.getElementById('mob-menu-btn');
  if(btn) btn.style.display = 'block';
  // ボトムナビのactive更新
  ['list','calendar','members','report'].forEach(v => {
    const el = document.getElementById('mbn-'+v);
    if(el) el.classList.toggle('active', view===v);
  });
  const menuBtn = document.getElementById('mbn-menu');
  if(menuBtn) menuBtn.classList.toggle('active',
    !['list','calendar','members','report'].includes(view));
  // ドロワー内のナビactive
  document.querySelectorAll('#mobile-drawer .nav-item').forEach(el => {
    el.classList.remove('active');
  });
  // モバイルロール名更新
  const rn = document.getElementById('mob-role-name');
  if(rn) rn.textContent = document.getElementById('sidebar-role-name')?.textContent || '';
}
