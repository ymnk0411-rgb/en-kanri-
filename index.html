<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EN 公演案件管理</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f5f5f3;color:#1a1a1a;font-size:14px;line-height:1.5}
button{cursor:pointer;font-family:inherit;font-size:14px;border:none;background:none;padding:0}
input,select,textarea{font-family:inherit;font-size:14px;outline:none}

/* ===== LAYOUT ===== */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:220px;background:#1a1a2e;color:#e0e0e0;flex-shrink:0;display:flex;flex-direction:column;overflow-y:auto}
#main{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* ===== SIDEBAR ===== */
.sidebar-logo{padding:18px 20px 14px;border-bottom:1px solid #2e2e4a}
.sidebar-logo .en{font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.5px}
.sidebar-logo .sub{font-size:11px;color:#888;margin-top:1px}
.sidebar-role{padding:10px 16px;margin:10px 12px;background:#2e2e4a;border-radius:8px;font-size:12px}
.sidebar-role .role-label{color:#aaa;font-size:11px}
.sidebar-role .role-name{color:#fff;font-weight:600;font-size:13px;margin-top:2px}
.sidebar-role .role-change{color:#7eb8f7;font-size:11px;cursor:pointer;margin-top:3px;text-decoration:underline}
.sidebar-nav{flex:1;padding:8px 0}
.nav-section{padding:16px 16px 4px;font-size:11px;color:#666;letter-spacing:.5px;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;color:#c0c0c8;cursor:pointer;transition:background .15s;font-size:13px;border-left:3px solid transparent}
.nav-item:hover{background:#2a2a40;color:#fff}
.nav-item.active{background:#2a2a40;color:#7eb8f7;border-left-color:#7eb8f7}
.nav-item .icon{font-size:16px;width:20px;text-align:center}

/* ===== TOPBAR ===== */
#topbar{background:#fff;border-bottom:1px solid #e8e8e4;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600}
.btn{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:background .15s;border:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:#444;border:1px solid #ddd}
.btn-outline:hover{background:#f5f5f3}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#ef4444;color:#fff}

/* ===== CONTENT ===== */
#content{flex:1;padding:24px;overflow-y:auto}

/* ===== STATS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:10px;padding:14px 16px;border:1px solid #ebebeb}
.stat-card .label{font-size:12px;color:#888;margin-bottom:4px}
.stat-card .value{font-size:20px;font-weight:600}

/* ===== FILTER BAR ===== */
.filter-bar{background:#fff;border-radius:10px;padding:12px 16px;border:1px solid #ebebeb;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff}
.filter-bar input{width:200px}

/* ===== TABLE ===== */
.table-wrap{background:#fff;border-radius:10px;border:1px solid #ebebeb;overflow:hidden}
.table-header{padding:10px 16px;border-bottom:1px solid #ebebeb;display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#666}
table{width:100%;border-collapse:collapse}
thead th{background:#f9f9f7;padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:#666;border-bottom:1px solid #ebebeb;white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid #f2f2ef;font-size:13px;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:#fafaf8}
.td-link{color:#2563eb;cursor:pointer;font-weight:500}
.td-link:hover{text-decoration:underline}

/* ===== BADGES ===== */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-blue{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}
.badge-orange{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.badge-yellow{background:#fefce8;color:#a16207;border:1px solid #fde68a}
.badge-green{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-gray{background:#f3f4f6;color:#6b7280;border:1px solid #e5e7eb}
.badge-purple{background:#faf5ff;color:#7e22ce;border:1px solid #e9d5ff}
.badge-red{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}

/* ===== DETAIL VIEW ===== */
.back-btn{display:flex;align-items:center;gap:6px;color:#666;cursor:pointer;font-size:13px;margin-bottom:12px;width:fit-content}
.back-btn:hover{color:#1a1a1a}
.detail-header{background:#fff;border-radius:10px;padding:20px 24px;border:1px solid #ebebeb;margin-bottom:16px}
.detail-title{font-size:20px;font-weight:700;margin-bottom:12px}
.progress-bar{display:flex;gap:0;margin-bottom:16px;border-radius:6px;overflow:hidden}
.progress-step{flex:1;padding:6px 8px;text-align:center;font-size:11px;font-weight:600;background:#e5e7eb;color:#9ca3af;position:relative}
.progress-step.done{background:#2563eb;color:#fff}
.progress-step.current{background:#f59e0b;color:#fff}
.detail-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.meta-item .ml{font-size:11px;color:#888;margin-bottom:2px}
.meta-item .mv{font-size:13px;font-weight:500}

/* ===== TABS ===== */
.tabs{display:flex;gap:0;border-bottom:2px solid #e8e8e4;margin-bottom:20px;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab:hover{color:#444}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}

/* ===== SECTION CARD ===== */
.section-card{background:#fff;border-radius:10px;border:1px solid #ebebeb;margin-bottom:16px;overflow:hidden}
.section-header{padding:14px 20px;border-bottom:1px solid #ebebeb;display:flex;justify-content:space-between;align-items:center;background:#fafaf8}
.section-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.section-body{padding:20px}

/* ===== FINANCE ===== */
.finance-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:1px solid #ddd;border-radius:8px;overflow:hidden}
.finance-cell{padding:12px 14px;border-right:1px solid #ddd;border-bottom:1px solid #ddd;text-align:center}
.finance-cell:last-child{border-right:none}
.finance-cell .fc-label{font-size:11px;color:#888;margin-bottom:4px}
.finance-cell .fc-value{font-size:16px;font-weight:700}
.finance-cell .fc-sub{font-size:11px;color:#aaa;margin-top:2px}
.finance-header{background:#1a1a2e;color:#fff}
.finance-header .fc-label{color:#aaa}
.finance-header .fc-value{color:#fff}
.fc-positive{color:#16a34a}
.fc-negative{color:#dc2626}

.cost-table{width:100%;border-collapse:collapse}
.cost-table th{background:#f9f9f7;padding:8px 12px;font-size:12px;color:#666;border:1px solid #ebebeb;text-align:right}
.cost-table th:first-child{text-align:left}
.cost-table td{padding:8px 12px;border:1px solid #ebebeb;font-size:13px;text-align:right}
.cost-table td:first-child{text-align:left}
.cost-table input{width:100%;text-align:right;border:1px solid #ddd;border-radius:4px;padding:4px 6px}
.cost-total{font-weight:700;background:#f9f9f7}

/* ===== INFO GRID ===== */
.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.info-block{border:1px solid #ebebeb;border-radius:8px;padding:14px 16px}
.info-block-title{font-size:12px;font-weight:600;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.info-row{display:flex;gap:8px;margin-bottom:6px;font-size:13px}
.info-row .ik{color:#888;width:100px;flex-shrink:0}
.info-row .iv{color:#1a1a1a;font-weight:500;flex:1}

/* ===== SCHEDULE ===== */
.schedule-table{width:100%;border-collapse:collapse}
.schedule-table th{background:#f9f9f7;padding:8px 12px;font-size:12px;color:#666;border:1px solid #ebebeb;text-align:left}
.schedule-table td{padding:8px 12px;border:1px solid #ebebeb;font-size:13px}
.schedule-table input,.schedule-table select{border:1px solid #ddd;border-radius:4px;padding:4px 8px;width:100%}

/* ===== MEMBER LIST ===== */
.member-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.member-card{border:1px solid #ebebeb;border-radius:8px;padding:12px 14px;background:#fafaf8}
.member-name{font-weight:600;font-size:14px;margin-bottom:4px}
.member-role{font-size:12px;color:#666}
.member-contact{font-size:12px;color:#888;margin-top:4px}

/* ===== VEHICLE ===== */
.vehicle-assign{border:1px solid #ebebeb;border-radius:8px;padding:14px;margin-bottom:10px}
.vehicle-assign-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vehicle-name{font-weight:600;font-size:14px}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;width:560px;max-width:90vw;max-height:85vh;overflow-y:auto;padding:28px}
.modal-title{font-size:18px;font-weight:700;margin-bottom:20px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-label{font-size:12px;color:#666;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px}
.form-input:focus{border-color:#2563eb}
textarea.form-input{resize:vertical}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:20px;padding-top:16px;border-top:1px solid #ebebeb}

/* ===== MEETING ===== */
.meeting-card{border:1px solid #ebebeb;border-radius:8px;padding:14px;margin-bottom:10px}
.meeting-date{font-size:12px;color:#888;margin-bottom:6px}
.meeting-content{font-size:13px;white-space:pre-wrap}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:40px 0;color:#aaa;font-size:14px}

/* ===== FILE ===== */
.file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid #ebebeb;border-radius:7px;margin-bottom:6px;font-size:13px}
.file-item .fi-icon{font-size:18px}

/* ===== LOGIN ===== */
#login-screen{position:fixed;inset:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:99999}
.login-box{background:#fff;border-radius:16px;padding:40px;width:380px;text-align:center}
.login-en{font-size:36px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:14px;color:#888;margin-bottom:32px}
.login-role-btn{width:100%;padding:14px;margin-bottom:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;border:2px solid #ddd;background:#fff;transition:background .15s}
.login-role-btn:hover{border-color:#2563eb;background:#eff6ff;color:#2563eb}
.login-role-desc{font-size:11px;color:#999;margin-top:3px;font-weight:400}

/* ===== RESPONSIVE ===== */
@media print {
  #sidebar,#mobile-nav,#topbar,.back-btn,.btn,#mobile-drawer,#mobile-overlay{display:none!important}
  #main{overflow:visible!important}
  #content{padding:0!important}
  .section-card{break-inside:avoid;border:1px solid #ddd!important}
}
@keyframes fb-bar{0%{left:-40%;right:100%}60%{left:100%;right:-30%}100%{left:100%;right:-30%}}
.fb-bar-inner{position:absolute;height:100%;background:#2563eb;animation:fb-bar 1.8s ease-in-out infinite}

/* モバイルボトムナビ */
#mobile-nav{display:none}
#mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:199}
#mobile-drawer{position:fixed;left:0;top:0;bottom:0;width:260px;background:#1a1a2e;z-index:200;transform:translateX(-100%);transition:transform .25s ease;overflow-y:auto}
#mobile-drawer.open{transform:translateX(0)}

@media (max-width:768px){
  #sidebar{display:none}
  #app{flex-direction:column}
  #main{height:100vh;display:flex;flex-direction:column}
  #content{flex:1;overflow-y:auto;padding:12px 12px 80px}
  #topbar{padding:0 12px;height:48px;flex-shrink:0}
  .topbar-title{font-size:14px}

  /* ボトムナビ表示 */
  #mobile-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    background:#fff;border-top:1px solid #e8e8e4;z-index:100;
    height:56px;align-items:stretch;
  }
  .mob-nav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;font-size:10px;color:#888;cursor:pointer;padding:4px 0;
    border:none;background:none;font-family:inherit;
  }
  .mob-nav-item.active{color:#2563eb}
  .mob-nav-item .mob-icon{font-size:20px}

  /* ドロワー内メニュー */
  #mobile-drawer .sidebar-logo{padding:16px 16px 12px}
  #mobile-drawer .nav-item{padding:10px 16px;font-size:14px}

  /* カード・テーブル */
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .finance-grid{grid-template-columns:repeat(2,1fr)}
  .info-grid{grid-template-columns:1fr}
  .member-grid{grid-template-columns:1fr}
  .detail-meta{grid-template-columns:repeat(2,1fr)}
  .form-grid{grid-template-columns:1fr}
  .form-full{grid-column:1}
  table{font-size:12px}
  thead th{padding:8px 8px}
  tbody td{padding:8px 8px}
  .modal{padding:20px 16px;max-height:90vh}
  .progress-bar{display:none}
  .tabs{gap:0}
  .tab{padding:8px 12px;font-size:12px}
  .section-body{padding:12px}
  .section-header{padding:10px 14px}
  .detail-header{padding:14px 16px}
  .detail-title{font-size:16px}
  .btn{padding:6px 12px;font-size:12px}
  .back-btn{margin-bottom:8px}
  #content .stats-grid .stat-card .value{font-size:16px}

  /* ログイン */
  .login-box{width:90vw;padding:28px 20px}
  .login-en{font-size:28px}
}
</style>
</head>
<body>

<!-- FIREBASE LOADING OVERLAY -->
<div id="fb-loading" style="display:none;position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:9990;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:28px;font-weight:700;letter-spacing:-1px">EN</div>
  <div style="font-size:13px;color:#666">データを読み込んでいます...</div>
  <div style="width:220px;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;position:relative">
    <div class="fb-bar-inner"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-en">EN</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:4px">太鼓一座縁</div>
    <div class="login-sub">公演案件管理システム</div>
    <div style="margin-bottom:16px;text-align:left">
      <div id="login-error" style="display:none;background:#dc2626;color:#fff;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;font-weight:600;text-align:center">
        ⚠️ パスワードに間違いがあります。<br>再度確認して入力してください
      </div>
      <label style="font-size:12px;color:#666;display:block;margin-bottom:5px">パスワード</label>
      <input id="login-password" type="password" placeholder="パスワードを入力"
        style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:none"
        onkeydown="if(event.key==='Enter')loginWithLastRole()"
        oninput="this.style.borderColor='#ddd'">
    </div>
    <button class="login-role-btn" onclick="tryLogin('admin')">
      管理者としてログイン
    </button>
    <button class="login-role-btn" onclick="tryLogin('executive')">
      幹部としてログイン
    </button>
    <button class="login-role-btn" onclick="tryLogin('member')">
      メンバーとしてログイン
    </button>
  </div>
</div>

<!-- MOBILE OVERLAY & DRAWER -->
<div id="mobile-overlay" onclick="closeMobileDrawer()"></div>
<div id="mobile-drawer">
  <div class="sidebar-logo">
    <div class="en">EN</div>
    <div class="sub">公演案件管理</div>
  </div>
  <div class="sidebar-role">
    <div class="role-label">ログイン中</div>
    <div class="role-name" id="mob-role-name">管理者</div>
    <div class="role-change" onclick="logout()">ロールを切り替え</div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">メイン</div>
    <div class="nav-item" onclick="navigate('list');closeMobileDrawer()"><span class="icon">📋</span>案件管理</div>
    <div class="nav-item" onclick="navigate('calendar');closeMobileDrawer()"><span class="icon">📅</span>案件カレンダー</div>
    <div class="nav-section">マスタ</div>
    <div class="nav-item" onclick="navigate('members');closeMobileDrawer()"><span class="icon">👥</span>メンバー管理</div>
    <div class="nav-item" onclick="navigate('customers');closeMobileDrawer()"><span class="icon">🏢</span>顧客管理</div>
    <div class="nav-item" onclick="navigate('vehicles');closeMobileDrawer()"><span class="icon">🚐</span>車両管理</div>
    <div class="nav-item" onclick="navigate('instruments');closeMobileDrawer()"><span class="icon">🥁</span>楽器管理</div>
    <div class="nav-item" onclick="navigate('equipment');closeMobileDrawer()"><span class="icon">🔧</span>機材管理</div>
    <div class="nav-section finance-only">集計</div>
    <div class="nav-item finance-only" onclick="navigate('report');closeMobileDrawer()"><span class="icon">📊</span>集計・レポート</div>
    <div class="nav-section">システム</div>
    <div class="nav-item" onclick="navigate('settings');closeMobileDrawer()"><span class="icon">⚙️</span>設定</div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="en">EN</div>
      <div class="sub">公演案件管理</div>
    </div>
    <div class="sidebar-role">
      <div class="role-label">ログイン中</div>
      <div class="role-name" id="sidebar-role-name">管理者</div>
      <div class="role-change" onclick="logout()">ロールを切り替え</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">メイン</div>
      <div class="nav-item active" data-view="list" onclick="navigate('list')">
        <span class="icon">📋</span>案件管理
      </div>
      <div class="nav-item" data-view="calendar" onclick="navigate('calendar')">
        <span class="icon">📅</span>案件カレンダー
      </div>
      <div class="nav-section">マスタ</div>
      <div class="nav-item" data-view="members" onclick="navigate('members')">
        <span class="icon">👥</span>メンバー管理
      </div>
      <div class="nav-item" data-view="customers" onclick="navigate('customers')">
        <span class="icon">🏢</span>顧客管理
      </div>
      <div class="nav-item" data-view="vehicles" onclick="navigate('vehicles')">
        <span class="icon">🚐</span>車両管理
      </div>
      <div class="nav-item" data-view="instruments" onclick="navigate('instruments')">
        <span class="icon">🥁</span>楽器管理
      </div>
      <div class="nav-item" data-view="equipment" onclick="navigate('equipment')">
        <span class="icon">🔧</span>機材管理
      </div>
      <div class="nav-item" data-view="performances" onclick="navigate('performances')">
        <span class="icon">🎼</span>演目管理
      </div>
      <div class="nav-section" id="finance-nav-section">集計</div>
      <div class="nav-item finance-only" data-view="report" onclick="navigate('report')">
        <span class="icon">📊</span>集計・レポート
      </div>      <div class="nav-section">システム</div>
      <div class="nav-item" data-view="settings" onclick="navigate('settings')">
        <span class="icon">⚙️</span>設定
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button id="mob-menu-btn" onclick="openMobileDrawer()" style="display:none;font-size:20px;padding:4px 8px;color:#444;background:none;border:none;cursor:pointer">☰</button>
        <div class="topbar-title" id="topbar-title">案件管理</div>

<script>
// ========== STATE ==========
let state = {
  role: 'admin',
  view: 'list',
  selectedProject: null,
  detailTab: '公演概要',
  projects: [],
  members: [],
  vehicles: [],
  instruments: [],
  equipment: [],
  customers: [],
  modal: null,
  passwords: { admin: 'wdwst323', executive: 'enenen', member: 'entaiko' },
  settings: { webhookUrl: localStorage.getItem('en_webhook_url')||'', notifyOnAdd: true, notifyOnUpdate: true },
  categories: ['公演','学校公演','ホテル連携','イベント'],
  performances: [],
};


// ========== FIREBASE ==========
let db = null;
let fbListenersActive = false;
const recentWrites = new Set();

function fbDot(color, label) {
  const d = document.getElementById('fb-dot');
  const l = document.getElementById('fb-status-label');
  if(d) d.style.background = color;
  if(l) l.textContent = label;
}

function fbSave(col, id, data) {
  if (!db) return;
  recentWrites.add(col+'/'+id);
  setTimeout(() => recentWrites.delete(col+'/'+id), 6000);
  const ref = db.ref(col+'/'+id);
  if (data === null) ref.remove().catch(()=>{});
  else ref.set(JSON.parse(JSON.stringify(data))).catch(()=>{});
}

function initFirebase(configJson) {
  try {
    let cfg;
    if (typeof configJson === 'object' && configJson !== null) {
      cfg = configJson;
    } else {
      let str = configJson.trim();
      // "const firebaseConfig = { ... };" 形式に対応
      str = str.replace(/^(?:const|var|let)\s+\w+\s*=\s*/, '');
      str = str.replace(/;?\s*$/, '');
      // JSON.parseを試みる
      try { cfg = JSON.parse(str); } catch(e) {
        // JavaScript オブジェクト形式（キーにクォートなし）に対応
        try { cfg = Function('"use strict";return (' + str + ')')(); } catch(e2) {
          alert('Firebase設定の形式が読み取れません。\nFirebaseコンソールの「firebaseConfig」の { } の中身だけをコピーしてください。');
          return false;
        }
      }
    }
    if (!cfg.apiKey || !cfg.databaseURL) {
      alert('設定が不完全です。\napiKey と databaseURL が含まれているか確認してください。\n※ databaseURL は Realtime Database を有効にすると表示されます。');
      return false;
    }
    if (typeof firebase === 'undefined') { alert('Firebaseの読み込みに失敗しました。インターネット接続を確認してください。'); return false; }
    try { firebase.app(); firebase.app().delete().then(()=>_initFb(cfg)); } catch(e) { _initFb(cfg); }
    return true;
  } catch(e) { alert('Firebase設定エラー: ' + e.message); return false; }
}

function _initFb(cfg) {
  firebase.initializeApp(cfg);
  db = firebase.database();
  db.ref('.info/connected').on('value', snap => {
    if (snap.val()) fbDot('#22c55e','同期中');
    else fbDot('#f59e0b','再接続中...');
  });
  localStorage.setItem('en_firebase_config', JSON.stringify(cfg));
  loadFromFirebase();
}

function loadFromFirebase() {
  const ov = document.getElementById('fb-loading');
  if(ov) ov.style.display='flex';

  // 10秒でタイムアウト
  const timeout = setTimeout(() => {
    if(ov) ov.style.display='none';
    fbDot('#ef4444','接続失敗');
    alert('Firebase接続がタイムアウトしました。\n\n以下を確認してください：\n① Realtime Databaseのルールが ".read": true, ".write": true になっているか\n② databaseURL が設定に含まれているか\n③ インターネット接続が正常か\n\nローカルモードで続行します。');
    navigate('list');
  }, 10000);

  db.ref('/').once('value', snap => {
    clearTimeout(timeout);
    const d = snap.val() || {};
    const arr = obj => obj ? Object.values(obj).filter(Boolean) : [];
    if(arr(d.projects).length)   state.projects    = arr(d.projects);
    if(arr(d.members).length)    state.members     = arr(d.members);
    // staffCategory・staffIds の正規化
    state.members.forEach(m => { if(!m.staffCategory) m.staffCategory = 'member'; });
    state.projects.forEach(p => { if(!p.staffIds) p.staffIds=[]; else p.staffIds=p.staffIds.map(id=>+id); });
    if(arr(d.vehicles).length)   state.vehicles    = arr(d.vehicles);
    if(arr(d.instruments).length)state.instruments = arr(d.instruments);
    if(arr(d.performances).length)state.performances = arr(d.performances);
    if(arr(d.equipment).length)  state.equipment   = arr(d.equipment);
    if(arr(d.customers).length)  state.customers   = arr(d.customers);
    // パスワードのマイグレーション：Firebaseに旧デフォルト(全entaiko)が保存されている場合は新デフォルトで上書き
    const _defaultPw = { admin: 'wdwst323', executive: 'enenen', member: 'entaiko' };
    if(d.settings?.passwords) {
      const _fbPw = d.settings.passwords;
      const _allOld = ['admin','executive','member'].every(r => !_fbPw[r] || _fbPw[r]==='entaiko');
      if(_allOld) {
        // 旧デフォルト→新パスワードに移行してFirebaseを更新
        state.passwords = {..._defaultPw};
        if(db) db.ref('settings/passwords').set(state.passwords);
      } else {
        // ユーザーが設定したパスワードがある場合はそれを使用
        state.passwords = Object.assign({..._defaultPw}, _fbPw);
      }
    } else {
      state.passwords = {..._defaultPw};
      if(db) db.ref('settings/passwords').set(state.passwords);
    }
    if(d.settings?.categories && d.settings.categories.length) state.categories = d.settings.categories;
    if(d.settings?.webhookUrl)   { state.settings.webhookUrl=d.settings.webhookUrl; localStorage.setItem('en_webhook_url',d.settings.webhookUrl); }
    if(ov) ov.style.display='none';
    setupRealtimeSync();
    if(state.view) render(); else navigate('list');
  }, err => {
    clearTimeout(timeout);
    if(ov) ov.style.display='none';
    fbDot('#ef4444','接続失敗');
    alert('Firebase読み込みエラー: ' + err.message + '\n\nFirebaseコンソールでセキュリティルールを確認してください。\nローカルモードで続行します。');
    navigate('list');
  });
}

function setupRealtimeSync() {
  if(fbListenersActive) return;
  fbListenersActive = true;
  let ready = false;
  setTimeout(()=>{ ready=true; }, 2500);

  const map = {
    projects: ()=>state.projects,
    members: ()=>state.members,
    vehicles: ()=>state.vehicles,
    instruments: ()=>state.instruments,
    equipment: ()=>state.equipment,
    customers: ()=>state.customers,
  };

  Object.entries(map).forEach(([col, getter]) => {
    db.ref(col).on('child_added', snap => {
      if(!ready) return;
      const item = snap.val(); if(!item) return;
      if(recentWrites.has(col+'/'+item.id)) return;
      if(!getter().find(x=>String(x.id)===String(item.id))) {
        getter().unshift(item);
        if(col==='projects' && state.settings.notifyOnAdd) {
          sendNotification('📋 新しい案件が追加されました', item.name);
        }
        if(['list',col].includes(state.view)) render();
      }
    });
    db.ref(col).on('child_changed', snap => {
      if(!ready) return;
      const item = snap.val(); if(!item) return;
      if(recentWrites.has(col+'/'+item.id)) return;
      const arr = getter();
      const idx = arr.findIndex(x=>String(x.id)===String(item.id));
      if(idx>=0) {
        arr[idx] = item;
        if(col==='projects' && state.settings.notifyOnUpdate) {
          sendNotification('✏️ 案件情報が更新されました', item.name);
        }
        if(['list','detail',col].includes(state.view)) render();
      }
    });
    db.ref(col).on('child_removed', snap => {
      if(!ready) return;
      const item = snap.val(); if(!item) return;
      const arr = getter();
      const idx = arr.findIndex(x=>String(x.id)===String(item.id));
      if(idx>=0) arr.splice(idx,1);
      if(['list',col].includes(state.view)) render();
    });
  });
}

function disconnectFirebase() {
  if(db) {
    Object.keys({projects:1,members:1,vehicles:1,instruments:1,equipment:1,customers:1}).forEach(c=>db.ref(c).off());
    db.ref('.info/connected').off();
  }
  db=null; fbListenersActive=false;
  try { firebase.app().delete(); } catch(e) {}
  localStorage.removeItem('en_firebase_config');
  fbDot('#d1d5db','未接続');
}

// ===== 通知 =====
function sendNotification(title, body) {
  // ブラウザ通知
  if('Notification' in window && Notification.permission==='granted') {
    try { new Notification('EN | '+title, {body: body||''}); } catch(e) {}
  }
  // Webhook (LINE / Make.com)
  const url = state.settings?.webhookUrl;
  if(url) {
    fetch(url, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:`【EN 案件管理】\n${title}\n📋 ${body||''}`})
    }).catch(()=>{});
  }
}

function requestNotificationPermission() {
  if('Notification' in window && Notification.permission==='default') {
    Notification.requestPermission();
  }
}



// ===== 郵便番号検索 =====
function searchZip(zipInputId, prefId, cityId, townId) {
  const zip = document.getElementById(zipInputId)?.value.replace(/[^0-9]/g,'');
  if(!zip || zip.length < 7) { alert('7桁の郵便番号を入力してください（例：5520022）'); return; }
  const btn = event?.currentTarget;
  if(btn) { btn.textContent='検索中...'; btn.disabled=true; }
  fetch('https://zipcloud.ibsnet.co.jp/api/search?zipcode='+zip)
    .then(r=>r.json())
    .then(data=>{
      if(btn) { btn.textContent='住所検索'; btn.disabled=false; }
      if(!data.results || !data.results[0]) { alert('郵便番号が見つかりませんでした'); return; }
      const r = data.results[0];
      if(prefId && document.getElementById(prefId)) document.getElementById(prefId).value = r.address1||'';
      if(cityId && document.getElementById(cityId)) document.getElementById(cityId).value = (r.address2||'')+(r.address3||'');
      if(townId) {
        // townIdがない場合は都道府県+市区町村を結合してaddressに入れる
        const addr = document.getElementById(townId);
        if(addr) addr.value = (r.address1||'')+(r.address2||'')+(r.address3||'');
      }
    })
    .catch(()=>{
      if(btn) { btn.textContent='住所検索'; btn.disabled=false; }
      alert('郵便番号検索に失敗しました。インターネット接続を確認してください。');
    });
}

// ===== Cloudinary設定 =====
const CLOUDINARY = {
  cloudName: 'duyhpt9pb',
  uploadPreset: 'ml_default'
};
function cloudinaryUploadUrl(resourceType) {
  return 'https://api.cloudinary.com/v1_1/'+CLOUDINARY.cloudName+'/'+resourceType+'/upload';
}
function getResourceType(filename) {
  var ext = (filename||'').split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','gif','webp','heic','bmp','svg'].includes(ext)) return 'image';
  if(['pdf'].includes(ext)) return 'image'; // CloudinaryはPDFをimage typeで処理可能
  if(['mp4','mov','avi','wmv','mkv','mp3','wav','m4a','aac','ogg'].includes(ext)) return 'video';
  return 'raw';
}
function cloudinaryViewUrl(resourceType, secureUrl, filename) {
  if(!secureUrl) return '';
  var ext = (filename||'').split('.').pop().toLowerCase();
  // PDFはimage uploadされるが、表示用URLに.pdfを付与
  if(ext === 'pdf') {
    var url = secureUrl;
    if(!url.endsWith('.pdf')) url = url.replace(/(\.[^.?]+)?(\?.*)?$/, '.pdf');
    return url;
  }
  return secureUrl;
}
function cloudinaryDownloadUrl(secureUrl, filename) {
  if(!secureUrl) return '';
  var safeName = (filename||'file').replace(/[^a-zA-Z0-9._-]/g, '_');
  var ext = (filename||'').split('.').pop().toLowerCase();
  var dl = secureUrl.replace('/upload/', '/upload/fl_attachment:'+safeName+'/');
  // PDFはURLの末尾に.pdfを確保
  if(ext === 'pdf' && !dl.endsWith('.pdf')) dl = dl.replace(/(\.[^.]+)?$/, '.pdf');
  return dl;
}

// Cloudinaryの強制ダウンロードURL（fl_attachment）
function cloudinaryDownloadUrl(url, filename) {
  if(!url) return url;
  // secure_urlのformatをfl_attachmentに変換
  // 例: https://res.cloudinary.com/cloud/image/upload/v123/folder/file.pdf
  // → https://res.cloudinary.com/cloud/image/upload/fl_attachment:filename/v123/folder/file.pdf
  try {
    const safeName = (filename||'file').replace(/[^a-zA-Z0-9._-]/g, '_');
    return url.replace('/upload/', '/upload/fl_attachment:'+safeName+'/');
  } catch(e) { return url; }
}

// ===== セットリスト時間ユーティリティ =====
function secToDisp(sec) {
  // 秒数 → 「3分30秒」表記
  sec = Math.max(0, +sec||0);
  const m = Math.floor(sec/60), s = sec%60;
  if(m > 0 && s > 0) return m+'分'+s+'秒';
  if(m > 0) return m+'分';
  if(s > 0) return s+'秒';
  return '0秒';
}
function secToMmss(sec) {
  // セットリスト入力欄用（後方互換）
  sec = Math.max(0, +sec||0);
  const m = Math.floor(sec/60), s = sec%60;
  return m + ':' + String(s).padStart(2,'0');
}
function minSecToSec(min, sec) {
  return (Math.max(0,+min||0) * 60) + Math.max(0,+sec||0);
}
function mmssToSec(str) {
  if(!str) return 0;
  str = String(str).trim();
  if(str.includes(':')) {
    const parts = str.split(':');
    return Math.max(0, (+parts[0]||0)*60 + (+parts[1]||0));
  }
  return Math.max(0, +str||0); // 数値のみなら秒扱い（分ではなく！）
}
function fmtTotalTime(totalSec) {
  const h = Math.floor(totalSec/3600);
  const m = Math.floor((totalSec%3600)/60);
  const s = totalSec%60;
  if(h>0) return h+'時間'+m+'分'+(s>0?s+'秒':'');
  if(m>0) return m+'分'+(s>0?s+'秒':'');
  return s+'秒';
}
// 分秒入力フィールドのHTML生成
function minSecInputHtml(idPrefix, totalSec) {
  totalSec = +totalSec||0;
  const m = Math.floor(totalSec/60), s = totalSec%60;
  return '<div style="display:flex;align-items:center;gap:6px">'+
    '<input id="'+idPrefix+'-min" type="number" min="0" max="999" value="'+m+'" '+
    'style="width:64px;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:14px;text-align:center">'+
    '<span style="font-size:13px;color:#555">分</span>'+
    '<input id="'+idPrefix+'-sec" type="number" min="0" max="59" value="'+s+'" '+
    'style="width:64px;border:1px solid #ddd;border-radius:6px;padding:6px 8px;font-size:14px;text-align:center">'+
    '<span style="font-size:13px;color:#555">秒</span>'+
    '</div>';
}
function getMinSecValue(idPrefix) {
  const m = +(document.getElementById(idPrefix+'-min')?.value)||0;
  const s = +(document.getElementById(idPrefix+'-sec')?.value)||0;
  return minSecToSec(m, s);
}

// ========== LOGIN / LOGOUT ==========
var _lastLoginRole = 'admin';
function showLoginError(msg) {
  var el = document.getElementById('login-error');
  if(!el) { console.warn('login-error not found'); return; }
  el.innerHTML = msg;
  el.style.cssText = 'display:block !important;background:#dc2626;color:#fff;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:12px;font-weight:600;text-align:center';
}
function hideLoginError() {
  var el = document.getElementById('login-error');
  if(el) el.style.display = 'none';
}
function tryLogin(role) {
  _lastLoginRole = role;
  var pw = (document.getElementById('login-password') || {}).value || '';
  var correct = (state.passwords && state.passwords[role]) || '';
  if (!pw) {
    showLoginError('⚠️ パスワードを入力してください');
    return;
  }
  if (pw !== correct) {
    showLoginError('⚠️ パスワードに間違いがあります。<br>再度確認して入力してください');
    var pwEl = document.getElementById('login-password');
    if(pwEl) { pwEl.style.borderColor='#dc2626'; pwEl.select(); }
    return;
  }
  hideLoginError();
  login(role);
}
function loginWithLastRole() { tryLogin(_lastLoginRole); }
function login(role) {
  state.role = role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').style.display = 'none';
  const nameMap = { admin: '管理者（山中 裕貴）', executive: '幹部', member: 'メンバー' };
  document.getElementById('sidebar-role-name').textContent = nameMap[role] || role;
  updateAdminOnly();
  requestNotificationPermission();
  if(isMobile()){ const btn=document.getElementById('mob-menu-btn'); if(btn) btn.style.display='block'; }
  const savedCfg = localStorage.getItem('en_firebase_config');
  if(savedCfg && !db) {
    try { if(initFirebase(JSON.parse(savedCfg))) return; } catch(e) {}
  }
  navigate('list');
}
function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-password').value = '';
}
function updateAdminOnly() {
  document.querySelectorAll('.admin-only').forEach(el => {
    el.style.display = (state.role === 'admin') ? 'flex' : 'none';
  });
  document.querySelectorAll('.finance-only').forEach(el => {
    el.style.display = canSeeFinance() ? 'flex' : 'none';
  });
}
function isAdmin()     { return state.role === 'admin'; }
function isExecutive() { return state.role === 'executive'; }
function isMember()    { return state.role === 'member'; }
// 契約金額・粗利・粗利率を見られるか（管理者のみ）
function canSeeRevenue() { return state.role === 'admin'; }
// 収支・原価タブにアクセスできるか（管理者・幹部）
function canSeeFinance() { return state.role === 'admin' || state.role === 'executive'; }

// ========== NAVIGATION ==========
function navigate(view, projectId) {
  state.view = view;
  if (projectId) state.selectedProject = projectId;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.querySelector(`[data-view="${view}"]`);
  if (nav) nav.classList.add('active');
  render();
  updateMobileNav(view);
}

// ========== RENDER ROUTER ==========
function render() {
  const views = {
    list: renderList,
    detail: renderDetail,
    members: renderMembers,
    customers: renderCustomers,
    vehicles: renderVehicles,
    instruments: renderInstruments,
    equipment: renderEquipment,
    performances: renderPerformances,
    report: renderReport,
    calendar: renderCalendar,
    settings: renderSettings,
  };
  (views[state.view] || renderList)();
}

// ========== STATUS HELPERS ==========
function statusBadge(status) {
  const map = {
    '新規':'badge-gray','仮押えスケジュール':'badge-yellow','受注':'badge-blue',
    '決定済':'badge-orange','実施完了':'badge-purple','完了':'badge-green','中止':'badge-red',
  };
  return `<span class="badge ${map[status]||'badge-gray'}">${status}</span>`;
}
function billingBadge(s) {
  const map={'未請求':'badge-gray','一部請求':'badge-yellow','請求済':'badge-blue','入金済':'badge-green'};
  return `<span class="badge ${map[s]||'badge-gray'}">${s}</span>`;
}
const PROGRESS_STEPS = ['新規','仮押えスケジュール','受注','決定済','実施完了','完了'];
function progressIdx(status) { return PROGRESS_STEPS.indexOf(status); }

// ========== FORMAT ==========
const yen = n => '¥' + (n||0).toLocaleString('ja-JP');
const fmtDate = d => { if(!d)return'-'; const dt=new Date(d); return `${dt.getFullYear()}年${dt.getMonth()+1}月${dt.getDate()}日`; };

// ========== LIST VIEW ==========
function renderList() {
  document.getElementById('topbar-title').textContent = '案件管理';
  document.getElementById('topbar-actions').innerHTML = `<button class="btn btn-primary" onclick="openNewProject()">+ 案件を作成</button>`;

  const active = state.projects.filter(p => p.status !== '完了' && p.status !== '中止').length;
  const confirmed = state.projects.filter(p => p.status === '決定済' || p.status === '実施完了' || p.status === '完了').length;
  const totalFee = canSeeRevenue() ? state.projects.filter(p=>p.status!=='中止').reduce((s,p)=>s+p.finance.contractAmount,0) : null;
  const pending = state.projects.filter(p=>p.status==='新規'||p.status==='仮押えスケジュール').length;

  let statsHtml = `<div class="stats-grid">
    <div class="stat-card"><div class="label">総案件数</div><div class="value">${state.projects.length} 件</div></div>
    <div class="stat-card"><div class="label">進行中</div><div class="value">${active} 件</div></div>
    <div class="stat-card"><div class="label">決定済・完了</div><div class="value">${confirmed} 件</div></div>
    ${canSeeRevenue() ? `<div class="stat-card"><div class="label">確定売上合計</div><div class="value">${yen(totalFee)}</div></div>` : `<div class="stat-card"><div class="label">検討中</div><div class="value">${pending} 件</div></div>`}
  </div>`;

  const rows = state.projects.map(p => {
    const customer = state.customers.find(c=>c.id===p.customerId);
    return `<tr>
      <td style="color:#888">${p.number}</td>
      <td><span class="td-link" onclick="navigate('detail',${p.id})">${p.name}</span></td>
      <td><span class="badge badge-gray" style="font-size:11px">${p.category}</span></td>
      <td>${statusBadge(p.status)}</td>
      <td>${billingBadge(p.billingStatus)}</td>
      <td>${customer?customer.name:'-'}</td>
      <td>${fmtDate(p.date)}</td>
      ${canSeeRevenue() ? `<td style="text-align:right;font-weight:600">${yen(p.finance.contractAmount)}</td>` : ''}
      <td><button class="btn btn-outline btn-sm" onclick="navigate('detail',${p.id})">詳細</button></td>
    </tr>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    ${statsHtml}
    <div class="filter-bar">
      <input placeholder="案件名・顧客で検索..." oninput="filterProjects(this.value)">
      <select onchange="filterByStatus(this.value)">
        <option value="">全ステータス</option>
        ${PROGRESS_STEPS.map(s=>`<option>${s}</option>`).join('')}
        <option>中止</option>
      </select>
      <select onchange="filterByCategory(this.value)">
        <option value="">全カテゴリー</option>
        ${state.categories.map(c=>`<option>${c}</option>`).join('')}
      </select>
    </div>
    <div class="table-wrap">
      <div class="table-header">
        <span>合計：${state.projects.length} 件</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-outline btn-sm">インポート</button>
          <button class="btn btn-outline btn-sm" onclick="exportCSV()">エクスポート</button>
        </div>
      </div>
      <table id="project-table">
        <thead><tr>
          <th>案件番号</th><th>案件名</th><th>案件種別</th><th>案件ステータス</th>
          <th>請求ステータス</th><th>顧客名</th><th>公演日</th>
          ${canSeeRevenue() ? '<th style="text-align:right">契約金額</th>' : ''}
          <th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

function filterProjects(q) {
  document.querySelectorAll('#project-table tbody tr').forEach(tr => {
    const txt = tr.textContent.toLowerCase();
    tr.style.display = txt.includes(q.toLowerCase()) ? '' : 'none';
  });
}
function filterByStatus(s) {
  document.querySelectorAll('#project-table tbody tr').forEach(tr => {
    tr.style.display = !s || tr.textContent.includes(s) ? '' : 'none';
  });
}
function filterByCategory(c) {
  document.querySelectorAll('#project-table tbody tr').forEach(tr => {
    tr.style.display = !c || tr.textContent.includes(c) ? '' : 'none';
  });
}

// ========== DETAIL VIEW ==========
function renderDetail() {
  const p = state.projects.find(x => x.id === state.selectedProject);
  if (!p) { navigate('list'); return; }
  document.getElementById('topbar-title').textContent = p.name;
  document.getElementById('topbar-actions').innerHTML = `
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="openEditProject(${p.id})">✏️ 編集</button>
      <button class="btn btn-primary btn-sm" onclick="openNewProject()">+ 新規案件</button>
    </div>`;

  const pidx = progressIdx(p.status);
  const progressHtml = PROGRESS_STEPS.map((s,i) => {
    const cls = i < pidx ? 'done' : i === pidx ? 'current' : '';
    return `<div class="progress-step ${cls}">${s}</div>`;
  }).join('');

  const customer = state.customers.find(c=>c.id===p.customerId);
  const tabs = ['公演概要','案件情報','セットリスト','スケジュール','メンバー・スタッフ','車両・機材','打ち合わせ','ファイル'];
  if (canSeeFinance()) tabs.splice(2, 0, isExecutive() ? '経費計算' : '収支・原価');

  const tabHtml = tabs.map(t => `<div class="tab ${state.detailTab===t?'active':''}" onclick="switchTab('${t}')">${t}</div>`).join('');

  let tabContent = '';
  switch(state.detailTab) {
    case '公演概要': tabContent = renderTabOverview(p, customer); break;
    case '案件情報': tabContent = renderTabInfo(p, customer); break;
    case 'セットリスト': tabContent = renderTabSetlist(p); break;
    case '収支・原価': tabContent = canSeeFinance() ? renderTabFinance(p) : ''; break;
    case '経費計算': tabContent = canSeeFinance() ? renderTabFinance(p) : ''; break;
    case 'スケジュール': tabContent = renderTabSchedule(p); break;
    case 'メンバー・スタッフ': tabContent = renderTabMembers(p); break;
    case '車両・機材': tabContent = renderTabVehicles(p); break;
    case '打ち合わせ': tabContent = renderTabMeetings(p); break;
    case 'ファイル': tabContent = renderTabFiles(p); break;
  }

  document.getElementById('content').innerHTML = `
    <div class="back-btn" onclick="navigate('list')">← 案件一覧に戻る</div>
    <div class="detail-header">
      <div class="detail-title">📁 ${p.name}</div>
      <div class="progress-bar">${progressHtml}</div>
      <div class="detail-meta">
        <div class="meta-item"><div class="ml">案件番号</div><div class="mv">${p.number}</div></div>
        <div class="meta-item"><div class="ml">案件種別</div><div class="mv">${p.category}</div></div>
        <div class="meta-item"><div class="ml">公演日</div><div class="mv">${fmtDate(p.date)}</div></div>
        <div class="meta-item"><div class="ml">請求ステータス</div><div class="mv">${billingBadge(p.billingStatus)}</div></div>
      </div>
    </div>
    <div class="tabs">${tabHtml}</div>
    ${tabContent}`;
}

function switchTab(tab) {
  state.detailTab = tab;
  render();
  if(tab === 'ファイル') {
    const pid = state.selectedProject;
    if(pid) setTimeout(()=>initFileDropzone(pid), 50);
  }
}

function submitEditProjectCustomer(pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  const selCid    = +document.getElementById('pc-cid').value||null;
  const doRegister = document.getElementById('pc-register')?.checked ?? true;
  const name      = document.getElementById('pc-name').value.trim();
  if(!name){ alert('顧客名を入力してください'); return; }

  const fields = {
    code:         document.getElementById('pc-code').value.trim(),
    name,
    type:         document.getElementById('pc-type').value,
    zipcode:      document.getElementById('pc-zip')?.value.trim()||'',
    address:      document.getElementById('pc-addr').value.trim(),
    phone:        document.getElementById('pc-phone').value.trim(),
    contact:      document.getElementById('pc-contact').value.trim(),
    contactPhone: document.getElementById('pc-contact-phone').value.trim(),
    email:        document.getElementById('pc-email').value.trim(),
  };

  if(selCid) {
    // 既存顧客が選択されている
    if(doRegister) {
      // 顧客管理を更新
      const c = state.customers.find(x=>x.id===selCid);
      if(c) { Object.assign(c, fields); fbSave('customers', selCid, c); }
    }
    p.customerId = selCid;
  } else {
    // 未選択（手動入力）
    if(doRegister) {
      // 新規顧客として顧客管理に追加
      const newId = state.customers.length>0 ? Math.max(...state.customers.map(x=>x.id))+1 : 1;
      const newC = { id:newId, ...fields };
      if(!newC.code) newC.code = 'C-'+String(newId).padStart(3,'0');
      state.customers.push(newC);
      fbSave('customers', newId, newC);
      p.customerId = newId;
    } else {
      // この案件にだけ顧客名等をメモとして保持（顧客管理には登録しない）
      // 案件の supplement に顧客情報を付記する（または customerId を null のままにする）
      p.customerId = null;
      // 顧客名を案件補足に記録
      const memo = '【顧客情報】'+name+(fields.phone?' / '+fields.phone:'')+(fields.contact?' / 担当:'+fields.contact:'');
      if(!p.supplement.includes('【顧客情報】')) {
        p.supplement = (p.supplement ? p.supplement+'\n' : '') + memo;
      }
    }
  }

  fbSave('projects', pid, p);
  closeModalForce();
  render();
}

function calcTotalCost(f) {
  const labor = (f.laborBreakdown&&f.laborBreakdown.length) ? f.laborBreakdown.reduce((s,x)=>s+(+x.amount||0),0) : (f.costs.labor||0);
  const outsource = (f.outsourceBreakdown&&f.outsourceBreakdown.length) ? f.outsourceBreakdown.reduce((s,x)=>s+(+x.amount||0),0) : (f.costs.outsource||0);
  const base = (f.costs.transport||0) + labor + outsource + (f.costs.misc||0) + (f.travelExpense||0);
  const custom = (f.customCosts||[]).reduce((s,c)=>s+(c.amount||0), 0);
  return base + custom;
}
function sumBreakdown(arr) { return (arr||[]).reduce((s,x)=>s+(+x.amount||0),0); }

  const f = p.finance;
  if(!f.customCosts) f.customCosts = [];
  if(!f.laborBreakdown) f.laborBreakdown = [];

  // 明細がある場合はそちらから合計を計算してcostsに反映
  if(f.laborBreakdown.length) f.costs.labor = sumBreakdown(f.laborBreakdown);
  if(f.outsourceBreakdown.length) f.costs.outsource = sumBreakdown(f.outsourceBreakdown);
  const laborTotal = sumBreakdown(f.laborBreakdown) || f.costs.labor || 0;
  const outsourceTotal = sumBreakdown(f.outsourceBreakdown) || f.costs.outsource || 0;

function recalcFinance(pid) {
  const t=+(document.getElementById('fc-transport')?.value)||0;
  // 人件費・外注人件費は明細から合計を計算
  const l=+(document.getElementById('fc-labor-display')?.textContent.replace(/[^0-9]/g,'')||0);
  const o=+(document.getElementById('fc-outsource-display')?.textContent.replace(/[^0-9]/g,'')||0);
  const m=+(document.getElementById('fc-misc')?.value)||0;
  const tr=+(document.getElementById('fc-travel')?.value)||0;
  let customTotal=0;
  document.querySelectorAll('.fc-custom-amt').forEach(el=>{ customTotal+=+(el.value)||0; });
  const total=t+l+o+m+tr+customTotal;
  if(document.getElementById('fc-total-display')) document.getElementById('fc-total-display').textContent=yen(total);
  if(canSeeRevenue()) {
    const contract=+(document.getElementById('fc-contract')?.value)||0;
    const gp=contract-total;
    const gpr=contract>0?(gp/contract*100).toFixed(1):'0.0';
    const c=gp>=0?'#16a34a':'#dc2626';
    if(document.getElementById('fc-gp-display')){document.getElementById('fc-gp-display').textContent=yen(gp);document.getElementById('fc-gp-display').style.color=c;}
    if(document.getElementById('fc-gpr-display')){document.getElementById('fc-gpr-display').textContent=gpr+'%';document.getElementById('fc-gpr-display').style.color=c;}
  }
}

function saveFinance(pid) {
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  p.finance.costs.transport=+(document.getElementById('fc-transport').value)||0;
  // 明細がある場合は合計を自動計算、ない場合は直接入力値を使用
  if(p.finance.laborBreakdown && p.finance.laborBreakdown.length) {
    p.finance.costs.labor = sumBreakdown(p.finance.laborBreakdown);
  }
  if(p.finance.outsourceBreakdown && p.finance.outsourceBreakdown.length) {
    p.finance.costs.outsource = sumBreakdown(p.finance.outsourceBreakdown);
  }
  p.finance.costs.misc=+(document.getElementById('fc-misc').value)||0;
  p.finance.travelExpense=+(document.getElementById('fc-travel').value)||0;
  if(canSeeRevenue()&&document.getElementById('fc-contract'))
    p.finance.contractAmount=+(document.getElementById('fc-contract').value)||0;
  fbSave('projects', pid, p);
  p.finance.customCosts=[];
  document.querySelectorAll('.fc-custom-label').forEach(labelEl=>{
    const cid=+labelEl.dataset.cid;
    const amtEl=document.querySelector(`.fc-custom-amt[data-cid="${cid}"]`);
    const label=labelEl.value.trim()||'（項目名未入力）';
    const amount=+(amtEl?.value)||0;
    p.finance.customCosts.push({id:cid,label,amount});
  });
  const f=p.finance;
  const totalCost=calcTotalCost(f);
  const grossProfit=f.contractAmount-totalCost;
  const grossRate=f.contractAmount>0?((grossProfit/f.contractAmount)*100).toFixed(1):'0.0';
  const gpClass=grossProfit>=0?'fc-positive':'fc-negative';
  const sb=document.getElementById('fc-summary-body');
  if(sb&&canSeeRevenue()){
    sb.innerHTML=`<div class="finance-grid">
      <div class="finance-cell finance-header"><div class="fc-label">契約金額</div><div class="fc-value">${yen(f.contractAmount)}</div></div>
      <div class="finance-cell"><div class="fc-label">${isExecutive()?'経費合計':'原価合計'}</div><div class="fc-value">${yen(totalCost)}</div></div>
      <div class="finance-cell"><div class="fc-label">粗利</div><div class="fc-value ${gpClass}">${yen(grossProfit)}</div></div>
      <div class="finance-cell"><div class="fc-label">粗利率</div><div class="fc-value ${gpClass}">${grossRate}%</div></div>
      <div class="finance-cell"><div class="fc-label">交通費</div><div class="fc-value">${yen(f.travelExpense)}</div></div>
    </div>`;
  } else if(sb){
    sb.innerHTML=`<div class="finance-grid" style="grid-template-columns:repeat(2,1fr)">
      <div class="finance-cell"><div class="fc-label">${isExecutive()?'経費合計':'原価合計'}</div><div class="fc-value">${yen(totalCost)}</div></div>
      <div class="finance-cell"><div class="fc-label">交通費</div><div class="fc-value">${yen(f.travelExpense)}</div></div>
    </div>`;
  }
  const toast=document.getElementById('fc-save-toast');
  if(toast){toast.style.display='inline';setTimeout(()=>{toast.style.display='none';},2000);}
}

function addCustomCost(pid) {
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;
  if(!p.finance.customCosts) p.finance.customCosts=[];
  const newId=Date.now();
  p.finance.customCosts.push({id:newId,label:'',amount:0});
  const tbody=document.getElementById('fc-custom-rows');
  if(tbody){
    const tr=document.createElement('tr');
    tr.id=`fc-custom-row-${newId}`;
    tr.innerHTML=`
      <td style="text-align:left"><input class="fc-custom-label" data-cid="${newId}" value="" placeholder="項目名を入力" oninput="recalcFinance(${pid})" style="border:none;width:100%;background:transparent;font-size:13px;color:#1a1a1a;padding:0;outline:none;text-align:left"></td>
      <td><input class="fc-custom-amt" data-cid="${newId}" type="number" style="width:150px;text-align:right;border:1px solid #ddd;border-radius:4px;padding:4px 6px;font-size:13px" value="0" oninput="recalcFinance(${pid})"></td>
      <td style="width:28px;text-align:center;padding:4px"><button onclick="deleteCustomCost(${pid},${newId})" style="color:#d1d5db;font-size:16px;line-height:1;cursor:pointer;background:none;border:none;padding:2px" title="削除" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">×</button></td>`;
    tbody.appendChild(tr);
    tr.querySelector('.fc-custom-label').focus();
  }
  // Firebase: save is done on 保存ボタン
}

function deleteCustomCost(pid,cid) {
  const p=state.projects.find(x=>x.id===pid);
  if(p&&p.finance.customCosts) p.finance.customCosts=p.finance.customCosts.filter(c=>c.id!==cid);
  const row=document.getElementById(`fc-custom-row-${cid}`);
  if(row) row.remove();
  recalcFinance(pid);
}

function memberCard(m, pid) {
  const badge = m.type==='admin'?'<span class="badge badge-blue" style="font-size:11px">管理者</span>':m.type==='executive'?'<span class="badge badge-purple" style="font-size:11px">幹部</span>':'';

    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><div class="member-name">${m.name}</div><div class="member-role">${m.role}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        ${badge}

      </div>
    </div>
    <div class="member-contact">📞 ${m.phone}</div>
    <div class="member-contact">✉️ ${m.email}</div>
  </div>`;
}
function renderTabMembers(p) {
  if(!p.staffIds) p.staffIds = [];
  // Firebaseから文字列で返ることがあるので数値に統一
  p.staffIds = p.staffIds.map(id=>+id);
  const assigned = state.members.filter(m=>p.staffIds.includes(+m.id));
  // staffCategoryがないメンバーは'member'として扱う
  const members = assigned.filter(m=>(m.staffCategory||'member')==='member');
  const staff   = assigned.filter(m=>m.staffCategory==='staff');
  const memberCards = members.map(m=>memberCard(m,p.id)).join('') || '<div style="font-size:13px;color:#aaa;padding:8px 0">未設定</div>';
  const staffCards  = staff.map(m=>memberCard(m,p.id)).join('')   || '<div style="font-size:13px;color:#aaa;padding:8px 0">未設定</div>';
  return `
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">🎵 出演メンバー（${members.length}名）</div>
        <button class="btn btn-outline btn-sm" onclick="openAssignByCategory(${p.id},'member')">＋ 追加</button>
      </div>
      <div class="section-body"><div class="member-grid" style="grid-template-columns:1fr">${memberCards}</div></div>
    </div>
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">🎛️ スタッフ（${staff.length}名）</div>
        <button class="btn btn-outline btn-sm" onclick="openAssignByCategory(${p.id},'staff')">＋ 追加</button>
      </div>
      <div class="section-body"><div class="member-grid" style="grid-template-columns:1fr">${staffCards}</div></div>
    </div>
  </div>`;
}
function removePersonFromProject(pid, mid) {
  const p = state.projects.find(x=>x.id===pid);
  if(p) {
    p.staffIds = (p.staffIds||[]).filter(id=>+id!==+mid);

function removeAsset(pid, type, id) {
  const p=state.projects.find(x=>x.id===pid);
  if(!p) return;
  if(type==='vehicle') p.vehicleIds=p.vehicleIds.filter(x=>x!==id);
  if(type==='instrument') p.instrumentIds=p.instrumentIds.filter(x=>x!==id);
  if(type==='equipment') p.equipmentIds=p.equipmentIds.filter(x=>x!==id);
  fbSave('projects',pid,p);
  render();
}

            data-slid="${sl.id}"
            style="width:48px;text-align:center;border:1px solid #ddd;border-radius:6px;padding:4px 5px;font-size:13px;font-weight:500"
            oninput="updateSetlistDurationSplit(${p.id},${sl.id})">

function openAddToSetlist(pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p.setlist) p.setlist=[];
  const catHtml = buildSetlistCatHtml(pid);
  showModal(`<div class="modal" onclick="event.stopPropagation()" style="max-width:520px">
    <div class="modal-title">演目を選択・編集</div>
    <div id="setlist-modal-cats" style="max-height:340px;overflow-y:auto;margin-bottom:12px">${catHtml||'<div class="empty-state" style="padding:20px 0">演目が登録されていません</div>'}</div>
    <details style="border:1px solid #e0e0e0;border-radius:8px;padding:10px 14px;margin-bottom:4px">
      <summary style="font-size:13px;font-weight:600;color:#444;cursor:pointer">＋ 新しい演目を追加</summary>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px">
        <div style="grid-column:1/-1"><label class="form-label">演目名 *</label><input id="pf-quick-name" class="form-input" placeholder="例：大地"></div>
        <div><label class="form-label">カテゴリー</label><input id="pf-quick-cat" class="form-input" placeholder="例：オリジナル"></div>
        <div class="form-full"><label class="form-label">標準演奏時間</label>${minSecInputHtml('pf-quick-dur',0)}</div>
        <div style="grid-column:1/-1;display:flex;justify-content:flex-end">
          <button class="btn btn-outline btn-sm" onclick="quickAddPerformance(${pid})">追加する</button>
        </div>
      </div>
    </details>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModalForce()">キャンセル</button>
      <button class="btn btn-primary" onclick="submitAddToSetlist(${pid})">セットリストに保存</button>
    </div>
  </div>`);
}

function buildSetlistCatHtml(pid) {
  const p = state.projects.find(x=>x.id===pid);
  const cats = {};
  state.performances.forEach(perf => {
    if(!cats[perf.category]) cats[perf.category]=[];
    cats[perf.category].push(perf);
  });
  return Object.entries(cats).map(([cat,items])=>{
    const rows = items.map(perf=>{
      const already = p && p.setlist ? p.setlist.some(sl=>sl.performanceId===perf.id) : false;
      return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5" id="perf-row-'+perf.id+'">'
        + '<input type="checkbox" class="setlist-check" value="'+perf.id+'" '+(already?'checked':'')+' style="width:16px;height:16px;flex-shrink:0">'
        + '<span style="flex:1;font-size:13px">'+perf.name+'</span>'
        + '<span style="font-size:12px;color:#aaa;flex-shrink:0">'+secToDisp(perf.duration||0)+'</span>'
        + '<button onclick="inlineEditPerf('+perf.id+','+pid+')" style="font-size:11px;color:#2563eb;background:none;border:1px solid #bfdbfe;border-radius:4px;padding:2px 7px;cursor:pointer;flex-shrink:0">編集</button>'
        + '</div>';
    }).join('');
    return '<div style="margin-bottom:10px">'
      + '<div style="font-size:11px;font-weight:700;color:#888;letter-spacing:.5px;margin:6px 0 4px;padding-bottom:3px;border-bottom:1px solid #ebebeb">'+cat+'</div>'
      + rows + '</div>';
  }).join('');
}

function inlineEditPerf(perfId, pid) {
  const perf = state.performances.find(x=>x.id===perfId);
  if(!perf) return;
  const row = document.getElementById('perf-row-'+perfId);
  if(!row) return;
  const checked = row.querySelector('input[type=checkbox]').checked;
  row.innerHTML = '<input type="checkbox" class="setlist-check" value="'+perfId+'" '+(checked?'checked':'')+' style="width:16px;height:16px;flex-shrink:0">'
    + '<input id="ie-name-'+perfId+'" value="'+perf.name+'" style="flex:1;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:13px;min-width:0">'
    + '<input id="ie-min-'+perfId+'" type="number" min="0" max="999" value="'+Math.floor((perf.duration||0)/60)+'" style="width:48px;border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-size:13px;text-align:center">'
    + '<span style="font-size:11px;color:#555">分</span>'
    + '<input id="ie-sec-'+perfId+'" type="number" min="0" max="59" value="'+(perf.duration||0)%60+'" style="width:44px;border:1px solid #ddd;border-radius:4px;padding:3px 5px;font-size:13px;text-align:center">'
    + '<span style="font-size:11px;color:#555">秒</span>'
    + '<input id="ie-cat-'+perfId+'" value="'+perf.category+'" placeholder="カテゴリー" style="width:74px;border:1px solid #ddd;border-radius:4px;padding:3px 6px;font-size:12px;min-width:0">'
    + '<button onclick="saveInlinePerf('+perfId+','+pid+')" style="font-size:11px;color:#fff;background:#2563eb;border:none;border-radius:4px;padding:3px 8px;cursor:pointer;flex-shrink:0">保存</button>'
    + '<button onclick="cancelInlinePerf('+perfId+','+pid+')" style="font-size:11px;color:#666;background:none;border:1px solid #ddd;border-radius:4px;padding:3px 6px;cursor:pointer;flex-shrink:0">✕</button>';
}

function saveInlinePerf(perfId, pid) {
  const perf = state.performances.find(x=>x.id===perfId);
  if(!perf) return;
  const newName = document.getElementById('ie-name-'+perfId)?.value.trim();
  const _ieMin = +(document.getElementById('ie-min-'+perfId)?.value)||0;
  const _ieSec = +(document.getElementById('ie-sec-'+perfId)?.value)||0;
  const newDur = minSecToSec(_ieMin, _ieSec);
  const newCat = document.getElementById('ie-cat-'+perfId)?.value.trim()||perf.category;
  if(!newName){alert('演目名は必須です');return;}
  perf.name = newName;
  perf.duration = newDur;
  perf.category = newCat;
  fbSave('performances', perfId, perf);
  // モーダル内のリストを再描画
  const container = document.getElementById('setlist-modal-cats');
  if(container) container.innerHTML = buildSetlistCatHtml(pid);
}

function cancelInlinePerf(perfId, pid) {
  const container = document.getElementById('setlist-modal-cats');
  if(container) container.innerHTML = buildSetlistCatHtml(pid);
}

function quickAddPerformance(pid) {
  const name = document.getElementById('pf-quick-name')?.value.trim();
  if(!name){alert('演目名を入力してください');return;}
  const newId = state.performances.length>0 ? Math.max(...state.performances.map(x=>x.id))+1 : 1;
  const newPerf = {
    id:newId,
    name,
    category: document.getElementById('pf-quick-cat')?.value||'その他',
    duration: 0,
    notes:''
  };
  state.performances.push(newPerf);
  fbSave('performances', newId, newPerf);
  // モーダル内のリストを再描画
  const container = document.getElementById('setlist-modal-cats');
  if(container) container.innerHTML = buildSetlistCatHtml(pid);
  document.getElementById('pf-quick-name').value='';
  document.getElementById('pf-quick-dur').value='';
}


function submitAddToSetlist(pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p.setlist) p.setlist=[];
  const checked = [...document.querySelectorAll('.setlist-check:checked')].map(c=>+c.value);
  const unchecked = [...document.querySelectorAll('.setlist-check:not(:checked)')].map(c=>+c.value);
  // 未チェックは削除
  p.setlist = p.setlist.filter(sl=>!unchecked.includes(sl.performanceId));
  // チェック済みで未追加のものを追加
  checked.forEach(pid2=>{
    if(!p.setlist.some(sl=>sl.performanceId===pid2)) {
      const perf = state.performances.find(x=>x.id===pid2);
      const newId = p.setlist.length>0 ? Math.max(...p.setlist.map(x=>x.id))+1 : 1;
      const nextOrder = p.setlist.length>0 ? Math.max(...p.setlist.map(x=>x.order))+1 : 1;
      p.setlist.push({id:newId, performanceId:pid2, order:nextOrder, duration:(perf?.duration||0), notes:''});
    }
  });
  fbSave('projects', pid, p);
  closeModalForce(); render();
}

function removeFromSetlist(pid, slId) {
  const p = state.projects.find(x=>x.id===pid);
  p.setlist = p.setlist.filter(x=>x.id!==slId);
  // orderを振り直し
  p.setlist.sort((a,b)=>a.order-b.order).forEach((x,i)=>x.order=i+1);
  fbSave('projects', pid, p); render();
}

function moveSetlist(pid, slId, dir) {
  const p = state.projects.find(x=>x.id===pid);
  const sorted = [...p.setlist].sort((a,b)=>a.order-b.order);
  const idx = sorted.findIndex(x=>x.id===slId);
  const swapIdx = idx+dir;
  if(swapIdx<0||swapIdx>=sorted.length) return;
  [sorted[idx].order, sorted[swapIdx].order] = [sorted[swapIdx].order, sorted[idx].order];
  fbSave('projects', pid, p); render();
}

function updateSetlistDuration(pid, slId, val) {
  // 後方互換（文字列入力用）
  const p = state.projects.find(x=>x.id===pid);
  const sl = p.setlist.find(x=>x.id===slId);
  if(sl) sl.duration = mmssToSec(val);
  _refreshSetlistTotal(pid);
}
function updateSetlistDurationSplit(pid, slId) {
  // 分秒分割入力用
  const p = state.projects.find(x=>x.id===pid);
  const sl = p.setlist.find(x=>x.id===slId);
  if(!sl) return;
  // slIdに対応するmin/sec inputを取得
  const minInputs = document.querySelectorAll('.sl-min-input[data-slid="'+slId+'"]');
  const secInputs = document.querySelectorAll('.sl-sec-input[data-slid="'+slId+'"]');
  const m = minInputs.length ? +(minInputs[0].value)||0 : 0;
  const s = secInputs.length ? +(secInputs[0].value)||0 : 0;
  sl.duration = minSecToSec(m, s);
  _refreshSetlistTotal(pid);
}
function _refreshSetlistTotal(pid) {
  const p = state.projects.find(x=>x.id===pid);
  if(!p) return;
  const totalSec = p.setlist.reduce((s,x)=>s+(+x.duration||0),0);
  const el = document.getElementById('sl-total-display');
  if(el) el.textContent = fmtTotalTime(totalSec);
}

function updateSetlistName(pid, slId, val) {
  const p = state.projects.find(x=>x.id===pid);
  const sl = p.setlist.find(x=>x.id===slId);
  if(sl) sl.customName = val.trim();
  // 保存はsaveAllSetlistボタンで行う
}

function saveAllSetlist(pid) {
  const p = state.projects.find(x=>x.id===pid);

function updateSetlistNotes(pid, slId, val) {

}

// ---- Tab: ファイル ----
function getFileIcon(type, name) {
  if(!name) return '📎';
  var ext = (name.split('.').pop()||'').toLowerCase();
  if(['jpg','jpeg','png','gif','webp','heic'].includes(ext)) return '🖼';
  if(ext==='pdf') return '📄';
  if(['mp3','wav','m4a','aac','ogg'].includes(ext)) return '🎵';
  if(['mp4','mov','avi'].includes(ext)) return '🎬';
  if(['doc','docx'].includes(ext)) return '📝';
  if(['xls','xlsx'].includes(ext)) return '📊';
  if(type==='folder') return '📁';
  return '📎';
}
function isImage(name) {
  var ext = (name||'').split('.').pop().toLowerCase();
  return ['jpg','jpeg','png','gif','webp'].includes(ext);
}

function renderTabFiles(p) {

    html += '<div style="font-size:12px;color:#888">または<u>クリックしてファイルを選択</u></div>';
    html += '<div style="font-size:11px;color:#aaa;margin-top:4px">JPG・PNG・PDF・MP3・MP4・Word・Excel など（最大50MB）</div>';

  } else {
    html += '<div style="padding:10px 12px;background:#fefce8;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#a16207;margin-bottom:12px">';
    html += '⚠️ Firebase Storageに接続するとファイルのアップロードが有効になります。<br>Firebaseコンソール → Storage → 始める で有効化してください。</div>';

var _currentFilePid = null;
function triggerFileInput(pid) {
  _currentFilePid = pid;
  var inp = document.getElementById('file-input-global');
  if(inp) inp.click();
}


function fmtFileSize(bytes) {
  if(!bytes) return '';
  if(bytes < 1024) return bytes+'B';
  if(bytes < 1024*1024) return (bytes/1024).toFixed(1)+'KB';
  return (bytes/1024/1024).toFixed(1)+'MB';
}

function fileDragOver(e) {
  e.preventDefault();
  e.currentTarget.style.background='#eff6ff';
  e.currentTarget.style.borderColor='#2563eb';
}
function fileDragLeave(e) {
  e.currentTarget.style.background='#f8faff';
  e.currentTarget.style.borderColor='#c7d7fd';
}
function fileDrop(e, pid) {
  e.preventDefault();
  fileDragLeave(e);
  const files = [...e.dataTransfer.files];
  if(files.length) uploadFiles(pid, files);
}
function fileInputChange(e, pid) {
  const files = [...e.target.files];
  if(files.length) uploadFiles(pid, files);
  e.target.value='';
}

function uploadFiles(pid, files) {
  var p = state.projects.find(function(x){ return x.id===pid; });
  if(!p) return;
  if(!p.files) p.files=[];
  var progressEl = document.getElementById('file-upload-progress-'+pid);
  if(progressEl) progressEl.style.display = 'block';

  files.forEach(function(file) {
    if(file.size > 100*1024*1024) { alert(file.name+' は100MBを超えています'); return; }

    var barId = 'prog-'+Date.now()+Math.random().toString(36).slice(2);
    if(progressEl) {
      progressEl.insertAdjacentHTML('beforeend',
        '<div id="'+barId+'" style="margin-bottom:8px">'
        +'<div style="font-size:12px;color:#555;margin-bottom:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">📤 '+file.name+'</div>'
        +'<div style="height:5px;background:#e5e7eb;border-radius:3px;overflow:hidden">'
        +'<div id="'+barId+'-bar" style="height:100%;background:#2563eb;width:0%;transition:width .2s"></div>'
        +'</div></div>'
      );
    }

    var resType = getResourceType(file.name);
    var uploadUrl = cloudinaryUploadUrl(resType);
    var fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CLOUDINARY.uploadPreset);
    fd.append('folder', 'en-kanri-'+pid);

    var xhr = new XMLHttpRequest();
    xhr.upload.onprogress = function(e) {
      if(e.lengthComputable) {
        var pct = Math.round(e.loaded/e.total*100);
        var bar = document.getElementById(barId+'-bar');
        if(bar) bar.style.width = pct+'%';
      }
    };
    xhr.onload = function() {
      var barEl = document.getElementById(barId);
      if(barEl) barEl.remove();
      if(progressEl && !progressEl.children.length) progressEl.style.display='none';

      if(xhr.status === 200) {
        var res = JSON.parse(xhr.responseText);
        var newId = Date.now();
        var ext = file.name.split('.').pop().toLowerCase();
        var ftype = ['jpg','jpeg','png','gif','webp'].includes(ext) ? 'image' : resType;
        var newFile = {
          id: newId, name: file.name, type: ftype,
          url: res.secure_url, size: file.size,
          resourceType: resType, publicId: res.public_id
        };
        p.files.push(newFile);
        fbSave('projects', pid, p);

        // リストに即追加
        var listEl = document.getElementById('file-list-'+pid);
        if(listEl) {
          var emptyEl = listEl.querySelector('[data-empty]');
          if(emptyEl) emptyEl.remove();
          var row = document.createElement('div');
          row.className = 'file-item';
          row.style.gap = '8px';
          row.innerHTML = buildFileRow(newFile, pid);
          listEl.appendChild(row);
        }
      } else {
        var errTxt = '';
        try { errTxt = JSON.parse(xhr.responseText).error.message; } catch(e){ errTxt = 'status '+xhr.status; }
        alert('アップロードエラー: '+file.name+'\n'+errTxt);
        console.error('Upload error:', xhr.responseText);
      }
    };
    xhr.onerror = function() {
      var barEl = document.getElementById(barId);
      if(barEl) barEl.remove();
      alert('ネットワークエラー: '+file.name);
    };
    xhr.open('POST', uploadUrl);
    xhr.send(fd);
  });
}

function buildFileRow(f, pid) {
  var icon = getFileIcon(f.type, f.name);
  var isImg = isImage(f.name);
  var ext = (f.name||'').split('.').pop().toLowerCase();
  var preview = (f.url && isImg)

function moveMember(id, dir) {
  state.members.forEach((m,i) => { if(m.order == null) m.order = i; });
  const sorted = [...state.members].sort((a,b) => (a.order||0) - (b.order||0));
  const idx = sorted.findIndex(m => m.id === id);
  const swapIdx = idx + dir;
  if(swapIdx < 0 || swapIdx >= sorted.length) return;
  // orderを入れ替え
  const tmpOrder = sorted[idx].order;
  sorted[idx].order   = sorted[swapIdx].order;
  sorted[swapIdx].order = tmpOrder;
  // Firebaseに保存
  const mA = state.members.find(m=>m.id===sorted[idx].id);
  const mB = state.members.find(m=>m.id===sorted[swapIdx].id);
  if(mA){ mA.order=sorted[idx].order; fbSave('members',mA.id,mA); }
  if(mB){ mB.order=sorted[swapIdx].order; fbSave('members',mB.id,mB); }
  render();
}

// ========== REPORT VIEW ==========
function renderReport() {
  if(!canSeeFinance()){document.getElementById('content').innerHTML='<div class="empty-state" style="padding:80px 0">管理者・幹部のみ閲覧可能です</div>';return;}
  document.getElementById('topbar-title').textContent = '集計・レポート';
  document.getElementById('topbar-actions').innerHTML = canSeeRevenue() ? `<button class="btn btn-outline" onclick="exportCSV()">CSVエクスポート</button>` : '';

  const active=state.projects.filter(p=>p.status!=='中止');
  const totalCost=active.reduce((s,p)=>s+calcTotalCost(p.finance),0);

  const catMap={};
  active.forEach(p=>{
    if(!catMap[p.category])catMap[p.category]={count:0,cost:0,revenue:0};
    catMap[p.category].count++;
    catMap[p.category].cost+=calcTotalCost(p.finance);
    catMap[p.category].revenue+=p.finance.contractAmount;
  });

  if(canSeeRevenue()) {
    const totalRevenue=active.reduce((s,p)=>s+p.finance.contractAmount,0);
    const totalGP=totalRevenue-totalCost;

    const projRows=active.map(p=>{
      const f=p.finance;
      const cost=calcTotalCost(f);
      const gp=f.contractAmount-cost;
      const gpr=f.contractAmount>0?(gp/f.contractAmount*100).toFixed(1):'0.0';
      return `<tr>
        <td>${p.name}</td>
        <td style="text-align:right">${yen(f.contractAmount)}</td>

    }).join('');

    document.getElementById('content').innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="label">総売上</div><div class="value">${yen(totalRevenue)}</div></div>
        <div class="stat-card"><div class="label">総原価</div><div class="value">${yen(totalCost)}</div></div>
        <div class="stat-card"><div class="label">粗利合計</div><div class="value" style="color:${totalGP>=0?'#16a34a':'#dc2626'}">${yen(totalGP)}</div></div>
        <div class="stat-card"><div class="label">平均粗利率</div><div class="value" style="color:${totalGP>=0?'#16a34a':'#dc2626'}">${gpRate}%</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 2fr;gap:16px">
        <div class="table-wrap">
          <div class="table-header">カテゴリー別集計</div>
          <table><thead><tr><th>カテゴリー</th><th style="text-align:right">件数</th><th style="text-align:right">売上</th><th style="text-align:right">原価</th></tr></thead>
          <tbody>${catRows}</tbody></table>
        </div>
        <div class="table-wrap">
          <div class="table-header">案件別収支</div>
          <table><thead><tr><th>案件名</th><th style="text-align:right">契約金額</th><th style="text-align:right">原価</th><th style="text-align:right">粗利</th><th style="text-align:right">粗利率</th></tr></thead>
          <tbody>${projRows}</tbody></table>
        </div>
      </div>`;
  } else {
    // 幹部：原価のみ表示
    const catRows=Object.entries(catMap).map(([cat,d])=>`<tr><td>${cat}</td><td style="text-align:right">${d.count}件</td><td style="text-align:right">${yen(d.cost)}</td></tr>`).join('');
    const projRows=active.map(p=>{
      const f=p.finance;
      const cost=calcTotalCost(f);
      return `<tr>
        <td>${p.name}</td>
        <td style="text-align:right">${yen(f.costs.transport)}</td>
        <td style="text-align:right">${yen(f.costs.labor)}</td>

    document.getElementById('content').innerHTML=`

// ========== CALENDAR VIEW ==========
function renderCalendar() {
  document.getElementById('topbar-title').textContent = '案件カレンダー';
  document.getElementById('topbar-actions').innerHTML = '';
  const now = new Date();
  const year = now.getFullYear(); const month = now.getMonth();
  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);
  const startDay = first.getDay();
  const monthNames = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  let cells = '';
  for(let i=0;i<startDay;i++) cells+=`<div style="min-height:80px;border:1px solid #ebebeb;padding:4px;background:#fafaf8"></div>`;
  for(let d=1;d<=last.getDate();d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayProjects=state.projects.filter(p=>p.date===dateStr);
    const evts=dayProjects.map(p=>`<div style="background:#dbeafe;color:#1e40af;border-radius:4px;padding:2px 4px;font-size:11px;margin-top:2px;cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" onclick="navigate('detail',${p.id})">${p.name}</div>`).join('');
    cells+=`<div style="min-height:80px;border:1px solid #ebebeb;padding:6px;vertical-align:top">
      <div style="font-size:12px;font-weight:${new Date(year,month,d).getDay()===0||new Date(year,month,d).getDay()===6?'700':'400'};color:${new Date(year,month,d).getDay()===0?'#dc2626':new Date(year,month,d).getDay()===6?'#2563eb':'#444'}">${d}</div>
      ${evts}
    </div>`;
  }
  const days=['日','月','火','水','木','金','土'];
  const headers=days.map((d,i)=>`<div style="background:#f9f9f7;border:1px solid #ebebeb;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;color:${i===0?'#dc2626':i===6?'#2563eb':'#666'}">${d}</div>`).join('');
  document.getElementById('content').innerHTML=`
    <div style="background:#fff;border-radius:10px;border:1px solid #ebebeb;overflow:hidden">
      <div style="padding:14px 20px;border-bottom:1px solid #ebebeb;font-size:15px;font-weight:700">${year}年 ${monthNames[month]}</div>
      <div style="padding:12px">
        <div style="display:grid;grid-template-columns:repeat(7,1fr)">${headers}${cells}</div>
      </div>
    </div>`;
}

// ========== MODALS ==========
function showModal(html) {
  let m = document.getElementById('modal-container');
  if(!m){m=document.createElement('div');m.id='modal-container';document.body.appendChild(m);}
  m.innerHTML=`<div class="modal-overlay" onclick="closeModal(event)">${html}</div>`;
}
function closeModal(e){
  if(e&&e.target&&!e.target.classList.contains('modal-overlay'))return;
  const m=document.getElementById('modal-container');
  if(m)m.innerHTML='';
}
function closeModalForce(){
  const m=document.getElementById('modal-container');
  if(m)m.innerHTML='';
}

function submitNewProject(){
  const name=document.getElementById('f-name').value.trim();
  const date=document.getElementById('f-date').value;
  if(!name||!date){alert('案件名と公演日は必須です');return;}
  const newId=Math.max(...state.projects.map(p=>p.id),0)+1;
  const today=new Date();
  const num=`${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}-${newId}`;
  const cid=+document.getElementById('f-customer').value||null;
  const fee=isAdmin()?(+document.getElementById('f-fee').value||0):0;
  state.projects.unshift({
    id:newId,number:num,name,category:document.getElementById('f-cat').value,
    status:document.getElementById('f-status').value,billingStatus:'未請求',
    date,startDate:date,endDate:date,customerId:cid,
    venue:{name:document.getElementById('f-venue').value,address:document.getElementById('f-vaddr').value,phone:'',fax:'',contact:''},
    staffIds:[],supplement:document.getElementById('f-supp').value,notes:'',
    finance:{contractAmount:fee,costs:{transport:0,labor:0,outsource:0,misc:0},travelExpense:0,customCosts:[],laborBreakdown:[],outsourceBreakdown:[]},
    schedule:[],meetings:[],vehicleIds:[],instrumentIds:[],equipmentIds:[],setlist:[],files:[],
  });
  fbSave('projects', newId, state.projects[0]);
  if(db) sendNotification('📋 新しい案件が追加されました', name);
  closeModalForce();
  navigate('detail',newId);
}
